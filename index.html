<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anveshan Team Form</title>

  <!-- Nepali Date Picker CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nepali-datepicker@2.0.3/dist/nepaliDatePicker.min.css">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2> Members Form </h2>

  <form action="https://formspree.io/f/maqpvqob" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required>

    <label>Date of Birth (BS):</label>
    <input type="text" id="nepali-date" name="dob_bs" placeholder="YYYY-MM-DD" required>

    <label>Address:</label>
    <textarea name="address" required></textarea>

    <label>Contact:</label>
    <input type="tel" name="contact" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <button type="submit">Submit</button>
  </form>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nepali-datepicker@2.0.3/dist/nepaliDatePicker.min.js"></script>

<script>
  $(document).ready(function () {
    $('#nepali-date').nepaliDatePicker({
      ndpYear: true,
      ndpMonth: true,
      ndpYearCount: 100
    });
  });
</script>

</body>
</html>
